<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iwanan.gg - Rankingi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        canvas { max-width: 100% !important; max-height: 300px !important; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <div class="logo">iwanan<span>.GG</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Strona Główna</a></li>
                    <li><a href="bohaterowie.html">Bohaterowie</a></li>
                    <li><a href="rankingi.html" class="active">Rankingi</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <section class="region-selector" style="margin-top: 30px;">
            <div class="player-card" style="width: 100%; max-width: none; padding: 15px;">
                <div class="region-tabs">
                    <button class="region-btn active">North America</button>
                    <button class="region-btn">Europe West</button>
                    <button class="region-btn">Korea</button>
                    <button class="region-btn">Japan</button>
                </div>
            </div>
        </section>

        <main class="ranking-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px;">
            <section class="charts-area">
                <div class="player-card">
                    <h3>Tier Distribution (Bar)</h3>
                    <div class="chart-container"><canvas id="barChart"></canvas></div>
                </div>
                <div class="player-card">
                    <h3>Tier Distribution (Pie)</h3>
                    <div class="chart-container"><canvas id="pieChart"></canvas></div>
                </div>
            </section>
            <aside class="table-area">
                <div class="player-card">
                    <h3>Detailed Stats</h3>
                    <p>Dane załadowane poprawnie.</p>
                </div>
            </aside>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <script>
        // Funkcja uruchamiająca wykresy
        function init() {
            if (typeof Chart === 'undefined') {
                alert("BŁĄD: Biblioteka Chart.js nadal nie została wczytana! Sprawdź czy nie masz włączonego AdBlocka.");
                return;
            }

            const ctxBar = document.getElementById('barChart');
            const ctxPie = document.getElementById('pieChart');
            const labels = ['Iron', 'Bronze', 'Silver', 'Gold', 'Platinum', 'Emerald', 'Diamond', 'Master+'];
            const data = [5, 15, 25, 20, 15, 10, 7, 3];
            const colors = ['#7f8c8d', '#d35400', '#95a5a6', '#f1c40f', '#1abc9c', '#2ecc71', '#3498db', '#9b59b6'];

            new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ data: data, backgroundColor: colors }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: data, backgroundColor: colors }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Czekamy 500ms dla pewności, że wszystko jest gotowe
        setTimeout(init, 500);
    </script>
</body>
</html>
