<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iwanan.gg - Rankingi</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Próbujemy załadować bibliotekę z innego źródła -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <div class="logo">iwanan<span>.GG</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Strona Główna</a></li>
                    <li><a href="bohaterowie.html">Bohaterowie</a></li>
                    <li><a href="rankingi.html" class="active">Rankingi</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <section class="region-selector" style="margin-top: 30px;">
            <div class="player-card" style="width: 100%; max-width: none; padding: 15px;">
                <div class="region-tabs">
                    <button class="region-btn active">North America</button>
                    <button class="region-btn">Europe West</button>
                    <button class="region-btn">Korea</button>
                    <button class="region-btn">Japan</button>
                </div>
            </div>
        </section>

        <main class="ranking-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px;">
            <section class="charts-area">
                <div class="player-card" style="margin-bottom: 20px; height: 350px;">
                    <h3>Tier Distribution</h3>
                    <canvas id="barChart"></canvas>
                </div>
                <div class="player-card" style="height: 350px;">
                    <h3>Detailed View</h3>
                    <canvas id="pieChart"></canvas>
                </div>
            </section>

            <aside class="table-area">
                <div class="player-card">
                    <table class="ranking-table" style="width: 100%;">
                        <!-- Twoja tabela zostaje bez zmian -->
                        <tr><td class="pro-name">Challenger</td><td>0.03%</td></tr>
                        <tr><td style="color: #f1c40f;">Gold</td><td>24.8%</td></tr>
                    </table>
                </div>
            </aside>
        </main>
    </div>

    <script>
        // Funkcja startująca wykresy
        function startCharts() {
            // SPRAWDZENIE: Czy biblioteka Chart w ogóle istnieje?
            if (typeof Chart === 'undefined') {
                console.error("BŁĄD: Biblioteka Chart.js nie załadowała się! Sprawdź AdBlocka.");
                alert("Wykresy nie mogą ruszyć, bo coś blokuje bibliotekę Chart.js w Twojej przeglądarce.");
                return;
            }

            const labels = ['Iron', 'Bronze', 'Silver', 'Gold', 'Platinum', 'Emerald', 'Diamond', 'Master+'];
            const dataValues = [2.7, 16.4, 23.2, 24.8, 17.6, 10.4, 3.46, 1.16];
            const colors = ['#7f8c8d', '#d35400', '#95a5a6', '#f1c40f', '#1abc9c', '#2ecc71', '#3498db', '#9b59b6'];

            // Wykres Słupkowy
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ data: dataValues, backgroundColor: colors }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Wykres Kołowy
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: dataValues, backgroundColor: colors }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Odpalamy, gdy strona jest gotowa
        window.addEventListener('load', startCharts);
    </script>
</body>
</html>
