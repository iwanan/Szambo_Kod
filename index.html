<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iwanan.gg - Porównaj się z Greatest Player of Today</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <div class="logo">iwanan<span>.GG</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Strona Główna</a></li>
                    <li><a href="bohaterowie.html">Bohaterowie</a></li>
                    <li><a href="rankingi.html">Rankingi</a></li>
                </ul>
            </nav>                
            
            <label class="switch">
                <input type="checkbox" id="spoilerToggle" onclick="toggleSpoiler()">
                <span class="slider round"></span>
            </label>
            <span style="margin-left: 10px; color: white;">JJK Spoiler Toggle</span>
            
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <img src="https://preview.redd.it/nah-id-win-v0-epcjymbbd3hc1.jpg?width=640&crop=smart&auto=webp&s=7e3054428206f862ddd30d6df0e28752295da965" id="Nah" class="hero-image">
            <img src="https://icon2.cleanpng.com/20240323/euu/transparent-smiley-face-happy-face-with-sunglasses-giving-thumbs-up65ff01f051ca37.60074786.webp" id="sunglassesThumbsUp" class="hero-image-off">
            <img src="https://i.redd.it/jw82rvev3i7e1.png" id="gojoLost" class="hero-image-off">
            <img src="https://pbs.twimg.com/media/F3v2hoUbgAAHnzu.jpg" id="sadGuy" class="hero-image-off">
            <div class="search-bar">
                <select class="region-select">
                    <option value="eune">EUNE</option>
                    <option value="euw">EUW</option>
                    <option value="na">NA</option>
                </select>
                <input type="text" placeholder="Nazwa gracza #TAG" class="search-input">
                <button class="search-button" onclick="fetchPlayerData()">Szukaj</button>
            </div>
        </section>

        <section class="comparison-section">
            <h2 class="section-title">Porównanie Statystyk</h2>
            
            <div class="cards-container">
                <div class="player-card user-card">
                    <div class="card-header">
                        <div class="avatar placeholder"></div>
                        <div class="info">
                            <h3 id="user-name">Twój Nick</h3>
                            <span class="rank" id="user-rank">Unranked</span>
                        </div>
                    </div>
                    <div class="stats">
                        <div class="stat-row"><span>Winrate:</span> <strong id="user-winrate">?</strong></div>
                        <div class="stat-row"><span>KDA:</span> <strong id="user-kda">?</strong></div>
                        <div class="stat-row"><span>CS/min:</span> <strong id="user-cspm">?</strong></div>
                    </div>
                </div>

                <div class="vs-badge">VS</div>

                <div class="player-card pro-card">
                    <div class="card-header">
                        <div class="avatar iwanan-avatar"></div>
                        <div class="info">
                            <h3 class="pro-name">Tomasz "iwanan" Gaś</h3>
                            <span class="rank challenger" id="iwanan-rank">Ładowanie...</span>
                        </div>
                    </div>
                    <div class="stats">
                        <div class="stat-row"><span>Winrate:</span> <strong id="iwananWinRate">...</strong></div>
                        <div class="stat-row"><span>KDA:</span> <strong id="iwananKDA">...</strong></div>
                        <div class="stat-row"><span>CS/min:</span> <strong id="iwananCSPM">...</strong></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
        //--------------
        //API KEY
        //--------------
        const API_KEY = "RGAPI-d03f4c8e-cfcb-494f-9e39-e35be664c3c4";

        // Tier order for rank comparison (higher index = better)
        const TIER_ORDER = ["IRON", "BRONZE", "SILVER", "GOLD", "PLATINUM", "EMERALD", "DIAMOND", "MASTER", "GRANDMASTER", "CHALLENGER"];
        const DIVISION_ORDER = ["IV", "III", "II", "I"];

        // Stored stats for comparison — populated once both players are loaded
        let userStats = null;
        let iwananStats = null;

        function getRankScore(tier, division, lp) {
            const tierIdx = TIER_ORDER.indexOf(tier?.toUpperCase());
            if (tierIdx === -1) return -1; // Unranked = worst
            const divIdx = DIVISION_ORDER.indexOf(division?.toUpperCase());
            // MASTER+ has no divisions, treat as division 0
            const divScore = divIdx === -1 ? 0 : divIdx;
            return tierIdx * 10000 + divScore * 1000 + (lp || 0);
        }

        function swapImages(newImage, oldImage) {
            if (!oldImage || !newImage) return;
            oldImage.classList.remove("hero-image");
            oldImage.classList.add("hero-image-off");
            newImage.classList.remove("hero-image-off");
            newImage.classList.add("hero-image");   
        }

        function toggleSpoiler() {
            var checkBox = document.getElementById("spoilerToggle");
            var jjkWin = document.getElementById("Nah");
            var emojiWin = document.getElementById("sunglassesThumbsUp");
            var jjkLoss = document.getElementById("gojoLost");
            var emojiLoss = document.getElementById("sadGuy");

            if (checkBox.checked) {
                if (jjkWin.classList.contains("hero-image")) swapImages(emojiWin, jjkWin);
                if (jjkLoss.classList.contains("hero-image")) swapImages(emojiLoss, jjkLoss);
            } else {
                if (emojiWin.classList.contains("hero-image")) swapImages(jjkWin, emojiWin);
                if (emojiLoss.classList.contains("hero-image")) swapImages(jjkLoss, emojiLoss);
            }
        }

        // Returns true if user beats iwanan, false otherwise (iwanan wins all ties)
        function isUserBetter(user, pro) {
            // 1. Rank
            const userRankScore = getRankScore(user.tier, user.division, user.lp);
            const proRankScore  = getRankScore(pro.tier,  pro.division,  pro.lp);
            if (userRankScore !== proRankScore) return userRankScore > proRankScore;

            // 2. Winrate
            if (user.winrate !== pro.winrate) return user.winrate > pro.winrate;

            // 3. KDA
            if (user.kda !== pro.kda) return user.kda > pro.kda;

            // 4. CS/min
            if (user.cspm !== pro.cspm) return user.cspm > pro.cspm;

            // All tied — iwanan wins
            return false;
        }

        function reactToComparison() {
            if (!userStats || !iwananStats) return;

            var checkBox = document.getElementById("spoilerToggle");
            var jjkLoss  = document.getElementById("gojoLost");
            var jjkWin   = document.getElementById("Nah");
            var emojiWin = document.getElementById("sunglassesThumbsUp");
            var emojiLoss = document.getElementById("sadGuy");
            var currentActiveImage = document.querySelector(".hero-image");

            const userWins = isUserBetter(userStats, iwananStats);

            if (!userWins) {
                // Iwanan wins
                swapImages(checkBox.checked ? emojiWin : jjkWin, currentActiveImage);
            } else {
                // User wins
                swapImages(checkBox.checked ? emojiLoss : jjkLoss, currentActiveImage);
            }
        }

        async function fetchMatchStats(puuid, accountRouting) {
            // Pobierz ostatnie 20 gier rankingowych Solo/Duo (queue=420)
            const matchListUrl = `https://${accountRouting}.api.riotgames.com/lol/match/v5/matches/by-puuid/${puuid}/ids?queue=420&count=20&api_key=${API_KEY}`;
            const matchListRes = await fetch(matchListUrl);
            if (!matchListRes.ok) throw new Error("Błąd pobierania listy meczy.");
            const matchIds = await matchListRes.json();

            if (matchIds.length === 0) return null;

            // Pobierz dane każdego meczu równolegle
            const matchPromises = matchIds.map(id =>
                fetch(`https://${accountRouting}.api.riotgames.com/lol/match/v5/matches/${id}?api_key=${API_KEY}`)
                    .then(r => r.ok ? r.json() : null)
            );
            const matches = await Promise.all(matchPromises);

            let totalKills = 0, totalDeaths = 0, totalAssists = 0, totalCS = 0, totalMinutes = 0;
            let validGames = 0;

            for (const match of matches) {
                if (!match) continue;
                const participant = match.info.participants.find(p => p.puuid === puuid);
                if (!participant) continue;

                const durationMinutes = match.info.gameDuration / 60;
                if (durationMinutes < 5) continue; // Pomiń remake'i

                totalKills   += participant.kills;
                totalDeaths  += participant.deaths;
                totalAssists += participant.assists;
                totalCS      += (participant.totalMinionsKilled || 0) + (participant.neutralMinionsKilled || 0);
                totalMinutes += durationMinutes;
                validGames++;
            }

            if (validGames === 0) return null;

            const avgDeaths = totalDeaths / validGames;
            const kda  = avgDeaths === 0
                ? parseFloat((totalKills + totalAssists).toFixed(2))
                : parseFloat(((totalKills + totalAssists) / totalDeaths).toFixed(2));
            const cspm = parseFloat((totalCS / totalMinutes).toFixed(1));

            return { kda, cspm };
        }

        async function fetchIwananData() {
            const gameName = "iwanan";
            const tagLine  = "7596";
            const accountRouting  = "europe";
            const platformRouting = "euw1";

            try {
                // PUUID
                const accountUrl = `https://${accountRouting}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(gameName)}/${encodeURIComponent(tagLine)}?api_key=${API_KEY}`;
                const accountRes  = await fetch(accountUrl);
                if (!accountRes.ok) throw new Error("Nie znaleziono konta Iwanana.");
                const accountData = await accountRes.json();
                const puuid = accountData.puuid;

                // Ranga + Match stats równolegle
                const leagueUrl = `https://${platformRouting}.api.riotgames.com/lol/league/v4/entries/by-puuid/${puuid}?api_key=${API_KEY}`;
                const [leagueRes, matchStats] = await Promise.all([
                    fetch(leagueUrl),
                    fetchMatchStats(puuid, accountRouting)
                ]);

                if (!leagueRes.ok) throw new Error("Błąd pobierania rankingu Iwanana.");
                const leagueData = await leagueRes.json();
                const soloQ = leagueData.find(q => q.queueType === "RANKED_SOLO_5x5");

                let winrate = 0, tier = null, division = null, lp = 0;

                if (soloQ) {
                    const wins   = soloQ.wins;
                    const losses = soloQ.losses;
                    winrate  = Math.round((wins / (wins + losses)) * 100);
                    tier     = soloQ.tier;
                    division = soloQ.rank;
                    lp       = soloQ.leaguePoints;
                    const rankText = `${tier} ${division} (${lp} LP)`;
                    document.getElementById("iwanan-rank").textContent = rankText;
                    document.getElementById("iwananWinRate").textContent = `${winrate}%`;
                } else {
                    document.getElementById("iwanan-rank").textContent = "Unranked";
                    document.getElementById("iwananWinRate").textContent = "0%";
                }

                let kda = 0, cspm = 0;
                if (matchStats) {
                    kda  = matchStats.kda;
                    cspm = matchStats.cspm;
                    document.getElementById("iwananKDA").textContent  = `${kda}:1`;
                    document.getElementById("iwananCSPM").textContent = `${cspm}`;
                } else {
                    document.getElementById("iwananKDA").textContent  = "Brak danych";
                    document.getElementById("iwananCSPM").textContent = "Brak danych";
                }

                iwananStats = { tier, division, lp, winrate, kda, cspm };
                reactToComparison();

            } catch (err) {
                console.error("Błąd ładowania Bossa:", err);
                document.getElementById("iwanan-rank").textContent    = "Błąd API";
                document.getElementById("iwananWinRate").textContent  = "68%";
                document.getElementById("iwananKDA").textContent      = "4.95:1";
                document.getElementById("iwananCSPM").textContent     = "9.8";
                // Fallback stats for comparison
                iwananStats = { tier: "CHALLENGER", division: "I", lp: 999, winrate: 68, kda: 4.95, cspm: 9.8 };
                reactToComparison();
            }
        }

        async function fetchPlayerData() {
            const rawInput  = document.querySelector(".search-input").value.trim();
            const regionVal = document.querySelector(".region-select").value;

            if (!rawInput.includes("#")) {
                alert("Wpisz Riot ID w poprawnym formacie: Nazwa#TAG (np. Hide on bush#KR1)");
                return;
            }

            const [gameName, tagLine] = rawInput.split("#");

            let accountRouting  = "europe";
            let platformRouting = "eun1";

            if (regionVal === "euw") {
                platformRouting = "euw1";
                accountRouting  = "europe";
            } else if (regionVal === "na") {
                platformRouting = "na1";
                accountRouting  = "americas";
            }

            // Reset UI
            document.getElementById("user-winrate").textContent = "...";
            document.getElementById("user-kda").textContent     = "...";
            document.getElementById("user-cspm").textContent    = "...";
            userStats = null;

            try {
                // PUUID
                const accountUrl = `https://${accountRouting}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(gameName)}/${encodeURIComponent(tagLine)}?api_key=${API_KEY}`;
                const accountRes  = await fetch(accountUrl);
                if (!accountRes.ok) throw new Error("Nie znaleziono gracza o podanym Riot ID.");
                const accountData = await accountRes.json();
                const puuid = accountData.puuid;

                // Ranga + Match stats równolegle
                const leagueUrl = `https://${platformRouting}.api.riotgames.com/lol/league/v4/entries/by-puuid/${puuid}?api_key=${API_KEY}`;
                const [leagueRes, matchStats] = await Promise.all([
                    fetch(leagueUrl),
                    fetchMatchStats(puuid, accountRouting)
                ]);

                if (!leagueRes.ok) throw new Error("Błąd pobierania rankingu gracza.");
                const leagueData = await leagueRes.json();
                const soloQ = leagueData.find(q => q.queueType === "RANKED_SOLO_5x5");

                if (!soloQ) {
                    alert("Ten gracz nie rozegrał jeszcze żadnych gier rankingowych w Solo/Duo.");
                    return;
                }

                const wins     = soloQ.wins;
                const losses   = soloQ.losses;
                const winrate  = Math.round((wins / (wins + losses)) * 100);
                const tier     = soloQ.tier;
                const division = soloQ.rank;
                const lp       = soloQ.leaguePoints;
                const rankText = `${tier} ${division} (${lp} LP)`;

                document.getElementById("user-name").textContent    = `${gameName}#${tagLine}`;
                document.getElementById("user-rank").textContent    = rankText;
                document.getElementById("user-winrate").textContent = `${winrate}%`;

                let kda = 0, cspm = 0;
                if (matchStats) {
                    kda  = matchStats.kda;
                    cspm = matchStats.cspm;
                    document.getElementById("user-kda").textContent  = `${kda}:1`;
                    document.getElementById("user-cspm").textContent = `${cspm}`;
                } else {
                    document.getElementById("user-kda").textContent  = "Brak danych";
                    document.getElementById("user-cspm").textContent = "Brak danych";
                }

                userStats = { tier, division, lp, winrate, kda, cspm };
                reactToComparison();

            } catch (err) {
                alert("Błąd: " + err.message);
                console.error(err);
                document.getElementById("user-winrate").textContent = "?";
                document.getElementById("user-kda").textContent     = "?";
                document.getElementById("user-cspm").textContent    = "?";
            }
        }

        window.onload = fetchIwananData;
    </script>
</body>
</html>
